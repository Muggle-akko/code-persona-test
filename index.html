<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Code Persona Test</title>
    <meta
      name="description"
      content="一个 Bear Blog 风格的代码人格诊断小网站。回答一些日常小情境，生成你的 HTTP 风格人格码。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell" aria-live="polite">
      <header class="site-head">
        <a class="brand" href="./" aria-label="Code Persona Test home">code-persona-test</a>
        <nav class="site-nav" aria-label="Site navigation">
          <a class="nav-link" href="./about.html">about</a>
          <a class="nav-link" href="https://github.com/your-name/code-persona-test" target="_blank" rel="noreferrer">github</a>
          <button class="theme-toggle" type="button" data-action="theme">light</button>
        </nav>
      </header>

      <section class="terminal" id="terminal">
        <pre class="ascii" aria-hidden="true">
+--------------------------------------------------+
| CODE PERSONA TEST                                |
| answer tiny moments / receive a strange code     |
+--------------------------------------------------+</pre
        >

        <div id="screen" class="screen"></div>
      </section>
    </main>

    <nav class="keypad" aria-label="Answer keyboard">
      <button type="button" data-key="a">a</button>
      <button type="button" data-key="b">b</button>
      <button type="button" data-key="backspace" aria-label="back">←</button>
      <button type="button" data-key="c">c</button>
      <button type="button" data-key="d">d</button>
      <button type="button" data-key="enter">enter</button>
    </nav>

    <script src="./app.js"></script>
  </body>
</html>
